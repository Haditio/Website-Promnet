    <h1>Stopwatch</h1> <!-- Judul utama halaman Stopwatch -->
    <div class="stopwatch-container"> <!-- Kontainer untuk elemen stopwatch -->
        <div id="display">00:00:00</div> <!-- Menampilkan waktu stopwatch -->
        <div class="buttons"> <!-- Kontainer untuk tombol-tombol stopwatch -->
            <button id="start">Start</button> <!-- Tombol untuk memulai stopwatch -->
            <button id="stop">Stop</button> <!-- Tombol untuk menghentikan stopwatch -->
            <button id="reset">Reset</button> <!-- Tombol untuk mereset stopwatch -->
