<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"> <!-- Menentukan karakter set yang digunakan adalah UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Mengatur tampilan untuk perangkat mobile -->
    <title>HASR'WEBSITE</title> <!-- Judul halaman yang ditampilkan di tab browser -->
    <link rel="icon" href=""> <!-- Menentukan ikon halaman (belum diisi) -->
    <link rel="stylesheet" href="style.css"> <!-- Menghubungkan file CSS untuk styling -->
    <link rel="icon" type="image/png" sizes="32x32" href="/Gambar/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/Gambar/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/Gambar/apple-touch-icon.png">
</head>
<body>
    <h1>HASR'WEBSITE</h1> <!-- Judul utama dari website -->
    
    <form>
        <h2>Login Akun</h2> <!-- Judul untuk form login -->

        <table>
            <!-- Baris untuk input Username -->            
            <tr>
                <td><label for="username">Username</label></td> <!-- Label yang menunjukkan input username -->
                <td><input type="text" id="username" name="username" placeholder="Masukkan Username"></td> <!-- Field untuk memasukkan username -->
            </tr>
            <!-- Baris untuk input Password -->
            <tr>
                <td><label for="password">Password</label></td> <!-- Label yang menunjukkan input password -->
                <td><input type="password" id="password" name="password" placeholder="Masukkan Password"></td> <!-- Field untuk memasukkan password -->
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <!-- Tautan yang tampak seperti tombol untuk melakukan login -->
                    <a href="/Responsive Nav Bar/index.html" class="login-btn" onclick="alert">Login</a> <!-- Tautan untuk login -->
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
